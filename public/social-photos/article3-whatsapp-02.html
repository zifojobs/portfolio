<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Inter', sans-serif; }
.canvas { width: 1080px; height: 1920px; position: relative; background: linear-gradient(180deg, #2A1810 0%, #3D2520 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 100px; }
.badge { position: absolute; top: 100px; background: #C2410C; color: #FEF3E2; padding: 14px 28px; border-radius: 30px; font-size: 16px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.content { text-align: center; max-width: 900px; }
.number { font-family: 'Fraunces', serif; font-size: 220px; font-weight: 600; color: #C2410C; line-height: 1; margin-bottom: 30px; }
.title { font-family: 'Fraunces', serif; font-size: 56px; font-weight: 600; color: #FEF3E2; line-height: 1.2; margin-bottom: 30px; letter-spacing: -0.02em; }
.subtitle-row { display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.subtitle-price { font-family: 'Fraunces', serif; font-size: 44px; font-weight: 600; color: #C2410C; letter-spacing: -0.01em; }
.subtitle-note { font-size: 24px; color: #E8DFCB; margin-top: 20px; }
.content-tranche { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.prices { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 20px; }
.price-fcfa, .price-eur { font-family: 'Fraunces', serif; font-size: 86px; font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; white-space: nowrap; }
.price-fcfa.highlight, .price-eur.highlight { font-size: 100px; }
.label { font-family: 'Fraunces', serif; font-size: 50px; font-weight: 600; color: #FEF3E2; margin-bottom: 8px; margin-top: 16px; }
.warning { font-size: 26px; color: #E8DFCB; margin-bottom: 50px; font-style: italic; }
.points { display: flex; flex-direction: column; gap: 22px; align-items: flex-start; max-width: 800px; margin: 0 auto; }
.point { display: flex; align-items: flex-start; gap: 18px; text-align: left; }
.point span { font-size: 26px; color: #FEF3E2; line-height: 1.4; font-weight: 500; }
.point svg { flex-shrink: 0; margin-top: 6px; }
.content-cta { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.cta-headline { font-family: 'Fraunces', serif; font-size: 60px; font-weight: 600; color: #FEF3E2; letter-spacing: -0.02em; }
.cta-subhead { font-size: 36px; color: #E8DFCB; margin-bottom: 24px; }
.cta-url { font-family: 'Fraunces', serif; font-size: 72px; font-weight: 700; color: #C2410C; letter-spacing: -0.02em; margin-bottom: 40px; }
.arrow-icon { margin-top: 20px; }
.swipe { position: absolute; bottom: 100px; left: 100px; font-size: 20px; color: #E8DFCB; font-weight: 600; letter-spacing: 0.05em; }
.pagination { position: absolute; bottom: 100px; left: 100px; font-size: 20px; color: #E8DFCB; font-weight: 600; letter-spacing: 0.05em; }
.brand { position: absolute; bottom: 100px; right: 100px; font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; color: #FEF3E2; letter-spacing: -0.02em; }
</style></head>
<body><div class="canvas">
        <div class="badge" style="background: #C2410C;">Tranche 1</div>
        <div class="content content-tranche">
            <div class="prices">
                <div class="price-fcfa " style="color: #C2410C;">100k à 300k FCFA</div>
                <div class="price-eur " style="color: #C2410C;">150 à 450€</div>
            </div>
            <div class="label">Le DIY</div>
            <div class="warning">Templates Wix, Squarespace, WordPress</div>
            <div class="points">
            <div class="point">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Design générique vu mille fois</span>
            </div>
            <div class="point">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Aucun support quand ça casse</span>
            </div>
            <div class="point">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Pas pour vendre votre crédibilité</span>
            </div></div>
        </div>
        <div class="pagination">2 / 5</div>
        <div class="brand">Saïbo Danfakha</div>
        </div></body></html>
