<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=627, initial-scale=1.0">
  <title>Comment choisir son développeur web freelance - LinkedIn</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 627px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .canvas {
      width: 1200px;
      height: 627px;
      position: relative;
      background: linear-gradient(135deg, #FEF3E2 0%, #FAF6EE 100%);
      display: flex;
      align-items: center;
      padding: 60px 80px;
    }
    .content {
      flex: 1;
      max-width: 600px;
    }
    .badge {
      background: #C2410C;
      color: #FEF3E2;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 24px;
    }
    .title {
      font-family: 'Fraunces', serif;
      font-size: 38px;
      font-weight: 600;
      color: #2A1810;
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 18px;
      color: #7A6F5A;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .points {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }
    .point {
      background: #2A1810;
      color: #FEF3E2;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #C2410C;
      color: #FEF3E2;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }
    .visual {
      width: 400px;
      height: 400px;
      background: #2A1810;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .visual-number {
      font-family: 'Fraunces', serif;
      font-size: 120px;
      font-weight: 600;
      color: #C2410C;
      line-height: 1;
    }
    .visual-text {
      font-size: 16px;
      color: #FEF3E2;
      margin-top: 10px;
    }
    .brand {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 600;
      color: #2A1810;
      letter-spacing: -0.02em;
    }
    .decoration {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: #C2410C;
      opacity: 0.05;
      top: -30px;
      right: 200px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="decoration"></div>
    <div class="content">
      <div class="badge">Blog</div>
      <div class="title">Comment choisir son développeur web freelance</div>
      <div class="subtitle">5 critères essentiels pour éviter les mauvaises surprises et trouver un partenaire fiable.</div>
      <div class="points">
        <span class="point">Réalisations</span>
        <span class="point">Communication</span>
        <span class="point">Références</span>
      </div>
      <a href="https://saibodanfakha.com/blog/" class="cta">
        Lire l'article
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
    <div class="visual">
      <div class="visual-number">5</div>
      <div class="visual-text">critères essentiels</div>
    </div>
    <div class="brand">Saïbo Danfakha</div>
  </div>
</body>
</html>
