<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080, initial-scale=1.0">
  <title>Pourquoi un site sur-mesure vaut mieux qu'un template</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .canvas {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: linear-gradient(135deg, #FEF3E2 0%, #FAF6EE 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }
    .badge {
      position: absolute;
      top: 60px;
      left: 60px;
      background: #C2410C;
      color: #FEF3E2;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .content {
      text-align: center;
      max-width: 800px;
    }
    .number {
      font-family: 'Fraunces', serif;
      font-size: 180px;
      font-weight: 600;
      color: #65733A;
      line-height: 1;
      margin-bottom: 20px;
    }
    .title {
      font-family: 'Fraunces', serif;
      font-size: 38px;
      font-weight: 600;
      color: #2A1810;
      line-height: 1.2;
      margin-bottom: 30px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 20px;
      color: #7A6F5A;
      line-height: 1.5;
      margin-bottom: 40px;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #2A1810;
      color: #FEF3E2;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
    }
    .brand {
      position: absolute;
      bottom: 60px;
      right: 60px;
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 600;
      color: #2A1810;
      letter-spacing: -0.02em;
    }
    .decoration {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #65733A;
      opacity: 0.05;
      top: -50px;
      right: -50px;
    }
    .decoration-2 {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: #C2410C;
      opacity: 0.08;
      bottom: 100px;
      left: 50px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="decoration"></div>
    <div class="decoration-2"></div>
    <div class="badge">Blog</div>
    <div class="content">
      <div class="number">02</div>
      <div class="title">Pourquoi un site sur-mesure vaut mieux qu'un template</div>
      <div class="subtitle">Les coûts cachés des sites templates et pourquoi le sur-mesure est un investissement</div>
      <a href="https://saibodanfakha.com/blog/" class="cta">
        Lire l'article
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
    <div class="brand">Saïbo Danfakha</div>
  </div>
</body>
</html>
