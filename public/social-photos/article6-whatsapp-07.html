<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Inter', sans-serif; }
.canvas { width: 1080px; height: 1920px; position: relative; background: linear-gradient(180deg, #2A1810 0%, #3D2520 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px 60px; }
.badge { position: absolute; top: 80px; left: 60px; background: #C2410C; color: #FEF3E2; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.content { text-align: center; max-width: 900px; }
.number { font-family: 'Fraunces', serif; font-size: 160px; font-weight: 600; color: #C2410C; line-height: 1; margin-bottom: 20px; }
.title { font-family: 'Fraunces', serif; font-size: 52px; font-weight: 600; color: #FEF3E2; line-height: 1.2; margin-bottom: 16px; letter-spacing: -0.02em; }
.subtitle-main { font-size: 24px; color: #FAF6EE; margin-bottom: 12px; font-weight: 500; }
.subtitle-note { font-size: 16px; color: #FAF6EE; font-style: italic; }
.error-name { font-family: 'Fraunces', serif; font-size: 44px; font-weight: 600; color: #FEF3E2; margin-bottom: 24px; letter-spacing: -0.02em; }
.content-error { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.points { display: flex; flex-direction: column; gap: 20px; align-items: center; }
.point { display: flex; align-items: flex-start; gap: 16px; text-align: left; max-width: 900px; }
.point span { font-size: 20px; color: #FEF3E2; line-height: 1.4; font-weight: 500; }
.point svg { flex-shrink: 0; margin-top: 3px; }
.swipe { position: absolute; bottom: 80px; left: 60px; font-size: 16px; color: #FAF6EE; font-weight: 600; letter-spacing: 0.05em; }
.pagination { position: absolute; bottom: 80px; left: 60px; font-size: 16px; color: #FAF6EE; font-weight: 600; letter-spacing: 0.05em; }
.brand { position: absolute; bottom: 80px; right: 60px; font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: #FEF3E2; letter-spacing: -0.02em; }
</style></head>
<body><div class="canvas">
        <div class="badge" style="background: #C2410C;">ÉTAPE 6</div>
        <div class="content content-error">
            <div class="error-name">LIENS LOCAUX</div>
            <div class="points">
            <div class="point">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Annuaires, partenaires, presse, vos réseaux</span>
            </div>
            <div class="point">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Quelques liens cohérents > une masse au hasard</span>
            </div>
            <div class="point">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Plus de confiance locale = meilleur classement</span>
            </div></div>
        </div>
        <div class="pagination">7/7</div>
        <div class="brand">Saïbo</div>
        </div></body></html>
