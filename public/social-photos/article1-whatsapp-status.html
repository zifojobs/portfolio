<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
  <title>Comment choisir son développeur web freelance - WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .canvas {
      width: 1080px;
      height: 1920px;
      position: relative;
      background: linear-gradient(180deg, #2A1810 0%, #3D2520 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }
    .badge {
      position: absolute;
      top: 80px;
      background: #C2410C;
      color: #FEF3E2;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .content {
      text-align: center;
      max-width: 800px;
    }
    .number {
      font-family: 'Fraunces', serif;
      font-size: 200px;
      font-weight: 600;
      color: #C2410C;
      line-height: 1;
      margin-bottom: 30px;
    }
    .title {
      font-family: 'Fraunces', serif;
      font-size: 52px;
      font-weight: 600;
      color: #FEF3E2;
      line-height: 1.2;
      margin-bottom: 30px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 22px;
      color: #E8DFCB;
      line-height: 1.5;
      margin-bottom: 50px;
    }
    .points {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 50px;
      align-items: center;
    }
    .point {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #FEF3E2;
      font-size: 18px;
    }
    .point svg {
      color: #C2410C;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #C2410C;
      color: #FEF3E2;
      padding: 18px 36px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
    }
    .brand {
      position: absolute;
      bottom: 80px;
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: #FEF3E2;
      letter-spacing: -0.02em;
    }
    .decoration {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: #C2410C;
      opacity: 0.08;
      top: -100px;
      right: -100px;
    }
    .decoration-2 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #65733A;
      opacity: 0.1;
      bottom: 200px;
      left: -50px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="decoration"></div>
    <div class="decoration-2"></div>
    <div class="badge">Blog</div>
    <div class="content">
      <div class="number">01</div>
      <div class="title">Comment choisir son développeur web freelance</div>
      <div class="subtitle">5 critères essentiels pour éviter les mauvaises surprises</div>
      <div class="points">
        <div class="point">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Réalisations réelles
        </div>
        <div class="point">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Communication claire
        </div>
        <div class="point">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Références vérifiées
        </div>
      </div>
      <a href="https://saibodanfakha.com/blog/" class="cta">
        Lire l'article
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
    <div class="brand">Saïbo Danfakha</div>
  </div>
</body>
</html>
