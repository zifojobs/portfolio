<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', sans-serif; }
.canvas { width: 1080px; height: 1080px; position: relative; background: linear-gradient(135deg, #FEF3E2 0%, #FAF6EE 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px; }
.badge { position: absolute; top: 60px; left: 60px; background: #C2410C; color: #FEF3E2; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.content { text-align: center; max-width: 900px; }
.number { font-family: 'Fraunces', serif; font-size: 160px; font-weight: 600; color: #C2410C; line-height: 1; margin-bottom: 20px; }
.title { font-family: 'Fraunces', serif; font-size: 52px; font-weight: 600; color: #2A1810; line-height: 1.15; margin-bottom: 20px; letter-spacing: -0.02em; }
.subtitle-main { font-size: 28px; color: #7A6F5A; margin-bottom: 16px; font-weight: 500; }
.subtitle-note { font-size: 16px; color: #7A6F5A; font-style: italic; }
.content-comparison { display: flex; flex-direction: column; align-items: center; gap: 24px; }
.points { display: flex; flex-direction: column; gap: 18px; align-items: center; }
.point { display: flex; align-items: center; gap: 14px; text-align: center; max-width: 700px; }
.point span { font-size: 22px; color: #2A1810; line-height: 1.3; font-weight: 500; }
.point svg { flex-shrink: 0; }
.cta-box { background: rgba(194, 65, 12, 0.1); border-left: 4px solid #C2410C; padding: 16px 24px; border-radius: 8px; font-size: 18px; color: #7A6F5A; font-weight: 600; }
.content-pricing { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.headline { font-family: 'Fraunces', serif; font-size: 40px; font-weight: 600; color: #2A1810; margin-bottom: 16px; }
.price-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
.price-item { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; color: #C2410C; letter-spacing: -0.01em; }
.price-sep { font-size: 24px; color: #7A6F5A; font-weight: 600; }
.note { font-size: 18px; color: #7A6F5A; font-style: italic; }
.content-cta { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.cta-headline { font-family: 'Fraunces', serif; font-size: 48px; font-weight: 600; color: #2A1810; letter-spacing: -0.02em; }
.cta-subhead { font-size: 28px; color: #7A6F5A; }
.cta-url { font-family: 'Fraunces', serif; font-size: 56px; font-weight: 700; color: #C2410C; letter-spacing: -0.02em; margin-bottom: 20px; }
.arrow-icon { margin-top: 10px; }
.swipe { position: absolute; bottom: 60px; left: 60px; font-size: 16px; color: #7A6F5A; font-weight: 600; letter-spacing: 0.05em; }
.pagination { position: absolute; bottom: 60px; left: 60px; font-size: 16px; color: #7A6F5A; font-weight: 600; letter-spacing: 0.05em; }
.brand { position: absolute; bottom: 60px; right: 60px; font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: #2A1810; letter-spacing: -0.02em; }
</style></head>
<body><div class="canvas">
        <div class="badge" style="background: #65733A;">MULTI-PAGES</div>
        <div class="content content-comparison">
            <div class="points">
            <div class="point">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#65733A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Contenu en profondeur</span>
            </div>
            <div class="point">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#65733A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>SEO puissant (Google t'aime)</span>
            </div>
            <div class="point">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#65733A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Facile à grandir</span>
            </div></div>
            <div class="cta-box">Parfait pour : PME, blog, croissance</div>
        </div>
        <div class="pagination">3 / 5</div>
        <div class="brand">Saïbo Danfakha</div>
        </div></body></html>
