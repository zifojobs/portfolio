<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Inter', sans-serif; }
.canvas { width: 1080px; height: 1920px; position: relative; background: linear-gradient(180deg, #2A1810 0%, #3D2520 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 100px; }
.badge { position: absolute; top: 100px; background: #C2410C; color: #FEF3E2; padding: 14px 28px; border-radius: 30px; font-size: 16px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.content { text-align: center; max-width: 900px; }
.number { font-family: 'Fraunces', serif; font-size: 220px; font-weight: 600; color: #C2410C; line-height: 1; margin-bottom: 30px; }
.title { font-family: 'Fraunces', serif; font-size: 64px; font-weight: 600; color: #FEF3E2; line-height: 1.15; margin-bottom: 30px; letter-spacing: -0.02em; }
.subtitle-main { font-size: 36px; color: #E8DFCB; margin-bottom: 20px; font-weight: 500; }
.subtitle-note { font-size: 24px; color: #E8DFCB; font-style: italic; }
.content-comparison { display: flex; flex-direction: column; align-items: center; gap: 40px; }
.points { display: flex; flex-direction: column; gap: 28px; align-items: center; }
.point { display: flex; align-items: flex-start; gap: 18px; text-align: center; max-width: 800px; }
.point span { font-size: 28px; color: #FEF3E2; line-height: 1.4; font-weight: 500; }
.point svg { flex-shrink: 0; margin-top: 2px; }
.cta-box { background: rgba(194, 65, 12, 0.2); border-left: 6px solid #C2410C; padding: 24px 32px; border-radius: 8px; font-size: 24px; color: #E8DFCB; font-weight: 600; }
.content-pricing { display: flex; flex-direction: column; align-items: center; gap: 32px; }
.headline { font-family: 'Fraunces', serif; font-size: 52px; font-weight: 600; color: #FEF3E2; margin-bottom: 24px; }
.price-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
.price-item { font-family: 'Fraunces', serif; font-size: 44px; font-weight: 700; color: #C2410C; letter-spacing: -0.01em; }
.price-sep { font-size: 32px; color: #E8DFCB; font-weight: 600; margin: 16px 0; }
.note { font-size: 26px; color: #E8DFCB; font-style: italic; }
.content-cta { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.cta-headline { font-family: 'Fraunces', serif; font-size: 60px; font-weight: 600; color: #FEF3E2; letter-spacing: -0.02em; }
.cta-subhead { font-size: 36px; color: #E8DFCB; }
.cta-url { font-family: 'Fraunces', serif; font-size: 72px; font-weight: 700; color: #C2410C; letter-spacing: -0.02em; margin-bottom: 30px; }
.arrow-icon { margin-top: 20px; }
.swipe { position: absolute; bottom: 100px; left: 100px; font-size: 20px; color: #E8DFCB; font-weight: 600; letter-spacing: 0.05em; }
.pagination { position: absolute; bottom: 100px; left: 100px; font-size: 20px; color: #E8DFCB; font-weight: 600; letter-spacing: 0.05em; }
.brand { position: absolute; bottom: 100px; right: 100px; font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; color: #FEF3E2; letter-spacing: -0.02em; }
</style></head>
<body><div class="canvas">
        <div class="badge">Article 04</div>
        <div class="content content-cta">
            <div class="cta-headline">L'article complet,</div>
            <div class="cta-subhead">rendez-vous sur</div>
            <div class="cta-url">saibodanfakha.com/blog</div>
            <svg class="arrow-icon" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </div>
        <div class="brand">Saïbo Danfakha</div>
        </div></body></html>
